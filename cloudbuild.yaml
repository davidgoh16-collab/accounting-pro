steps:
  # Build the Docker image
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - build
      - -t
      - gcr.io/$PROJECT_ID/accounting-pro:$COMMIT_SHA
      - -t
      - gcr.io/$PROJECT_ID/accounting-pro:latest
      - .

  # Push both tags to Container Registry
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - push
      - --all-tags
      - gcr.io/$PROJECT_ID/accounting-pro

  # Deploy to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - run
      - deploy
      - accounting-pro
      - --image=gcr.io/$PROJECT_ID/accounting-pro:$COMMIT_SHA
      - --region=$_REGION
      - --platform=managed
      - --allow-unauthenticated
      - --port=8080

substitutions:
  _REGION: europe-west2

images:
  - gcr.io/$PROJECT_ID/accounting-pro:$COMMIT_SHA
  - gcr.io/$PROJECT_ID/accounting-pro:latest

options:
  logging: CLOUD_LOGGING_ONLY
