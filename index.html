
<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Geo Pro</title>
    
    <!-- PWA Configuration -->
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#f5f5f4" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#0c0a09" media="(prefers-color-scheme: dark)" />
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/921/921490.png">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin=""/>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.4.1/dist/MarkerCluster.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.4.1/dist/MarkerCluster.Default.css" />
    <script src="https://unpkg.com/leaflet.markercluster@1.4.1/dist/leaflet.markercluster.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Figtree:ital,wght@0,300..900;1,300..900&display=swap" rel="stylesheet">
    <style>
      html {
        font-size: 16px;
        -webkit-tap-highlight-color: transparent;
      }
      body {
        font-family: 'Figtree', sans-serif;
        background-color: #f5f5f4; /* stone-100 */
        color: #292524; /* stone-800 */
        background-image: 
          radial-gradient(circle at 15% 50%, #ecfdf5, transparent 25%), 
          radial-gradient(circle at 85% 30%, #eff6ff, transparent 25%),
          radial-gradient(circle at 70% 90%, #fffbeb, transparent 20%);
        background-size: 100% 100%;
        background-attachment: fixed;
        transition: background-color 0.3s ease, color 0.3s ease;
        overscroll-behavior-y: none; /* Prevents pull-to-refresh on mobile */
      }
      
      /* Dark Mode Overrides */
      html.dark body {
        background-color: #0c0a09; /* stone-950 */
        color: #f5f5f4; /* stone-100 */
        background-image: 
          radial-gradient(circle at 15% 50%, rgba(6, 78, 59, 0.15), transparent 25%), 
          radial-gradient(circle at 85% 30%, rgba(30, 58, 138, 0.15), transparent 25%),
          radial-gradient(circle at 70% 90%, rgba(120, 53, 15, 0.15), transparent 20%);
      }

      .custom-scrollbar::-webkit-scrollbar {
        width: 8px;
      }
      .custom-scrollbar::-webkit-scrollbar-track {
        background: #e7e5e4;
        border-radius: 10px;
      }
      html.dark .custom-scrollbar::-webkit-scrollbar-track {
        background: #292524;
      }
      .custom-scrollbar::-webkit-scrollbar-thumb {
        background: #a8a29e;
        border-radius: 10px;
        border: 2px solid #e7e5e4;
      }
      html.dark .custom-scrollbar::-webkit-scrollbar-thumb {
        background: #57534e;
        border: 2px solid #292524;
      }
      .custom-scrollbar::-webkit-scrollbar-thumb:hover {
        background: #78716c;
      }
    </style>
<script>
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('/service-worker.js')
        .then(registration => {
          console.log('ServiceWorker registration successful with scope: ', registration.scope);
        }, err => {
          console.log('ServiceWorker registration failed: ', err);
        });
    });
  }
</script>
</head>
  <body>
    <div id="root"></div>
    <script type="module" src="/index.tsx"></script>
  </body>
</html>
